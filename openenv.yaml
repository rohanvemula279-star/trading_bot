name: llm-quant-trading-env
version: 1.0.0
description: Train LLM agents for quantitative trading strategies
author: THE DEVELOPERS
license: MIT

# REQUIRED: Task definitions
tasks:
  - id: easy
    name: Basic Trading Signals
    description: Generate basic buy/sell signals based on market data
    difficulty: easy
    max_steps: 50
    
  - id: medium
    name: Portfolio Management
    description: Manage multi-asset portfolios with rebalancing
    difficulty: medium
    max_steps: 100
    
  - id: hard
    name: Risk-Adjusted Strategies
    description: Implement sophisticated risk-adjusted trading strategies
    difficulty: hard
    max_steps: 50

# REQUIRED: Type definitions
observation_space:
  type: SafetyObservation
  module: models
  
action_space:
  type: SafetyAction
  module: models

reward_range: [0.0, 1.0]

# REQUIRED: Grader references
graders:
  easy: graders.grade_easy_task
  medium: graders.grade_medium_task
  hard: graders.grade_hard_task

# OPTIONAL but helpful
tags:
  - quant-trading
  - llm-agents
  - financial-markets
  - portfolio-management
  - risk-management
  - algorithmic-trading

environment_class: environment.SafetyReviewEnv
